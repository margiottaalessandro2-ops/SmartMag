<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartExpiry - Personal AI Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-20">

    <div class="max-w-md mx-auto p-4">
        <header class="mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">SmartExpiry</h1>
            <span class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded-full">Offline Mode</span>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
            <h2 class="text-lg font-semibold mb-4 text-gray-700">Aggiungi Prodotto</h2>
            
            <label class="block w-full bg-blue-600 text-white text-center py-3 rounded-xl font-bold cursor-pointer hover:bg-blue-700 transition mb-4">
                📸 Scansiona con Foto (IA)
                <input type="file" accept="image/*" capture="environment" class="hidden" onchange="processImage(this)">
            </label>

            <div id="loading" class="hidden text-center text-sm text-blue-500 mb-2 italic">Analisi immagine in corso...</div>

            <div class="space-y-3">
                <input type="text" id="desc" placeholder="Descrizione prodotto" class="w-full p-3 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="azienda" placeholder="Azienda" class="w-full p-3 border border-gray-200 rounded-lg">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="lotto" placeholder="Lotto" class="p-3 border border-gray-200 rounded-lg">
                    <input type="date" id="scadenza" class="p-3 border border-gray-200 rounded-lg">
                </div>
                <div class="flex items-center space-x-2">
                    <label class="text-sm text-gray-600">Preavviso (giorni):</label>
                    <input type="number" id="preavviso" value="7" class="w-20 p-2 border border-gray-200 rounded-lg">
                </div>
                <button onclick="salvaProdotto()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600">Salva nel Catalogo</button>
            </div>
        </div>

        <div class="flex gap-2 mb-4">
            <button onclick="exportExcel()" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-semibold">Excel</button>
            <button onclick="exportPDF()" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-semibold">PDF</button>
            <select id="groupSelect" onchange="mostraProdotti()" class="flex-1 bg-gray-100 text-gray-700 p-2 rounded-lg text-sm">
                <option value="scadenza">Ordina Scadenza</option>
                <option value="azienda">Raggruppa Azienda</option>
            </select>
        </div>

        <div id="listaProdotti" class="space-y-3">
            </div>
    </div>

    <script>
        let prodotti = JSON.parse(localStorage.getItem('catalogo_prodotti')) || [];

        // Funzione per elaborare l'immagine con IA (Tesseract OCR)
        async function processImage(input) {
            const file = input.files[0];
            if (!file) return;

            document.getElementById('loading').classList.remove('hidden');
            
            try {
                const result = await Tesseract.recognize(file, 'ita', { logger: m => console.log(m) });
                const text = result.data.text;
                
                // Logica semplice di estrazione dati dal testo
                document.getElementById('desc').value = text.substring(0, 30).trim();
                
                // Cerchiamo una data (formato base)
                const dateMatch = text.match(/\d{2}[/.-]\d{2}[/.-]\d{2,4}/);
                if (dateMatch) {
                    const parts = dateMatch[0].split(/[./-]/);
                    const formattedDate = parts.length === 3 ? `${parts[2].length === 2 ? '20'+parts[2] : parts[2]}-${parts[1]}-${parts[0]}` : "";
                    document.getElementById('scadenza').value = formattedDate;
                }
                
                alert("Analisi completata! Verifica i dati inseriti.");
            } catch (e) {
                alert("Errore durante l'analisi dell'immagine.");
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function salvaProdotto() {
            const p = {
                id: Date.now(),
                desc: document.getElementById('desc').value,
                azienda: document.getElementById('azienda').value || 'Generica',
                lotto: document.getElementById('lotto').value,
                scadenza: document.getElementById('scadenza').value,
                preavviso: parseInt(document.getElementById('preavviso').value)
            };

            if (!p.desc || !p.scadenza) return alert("Inserisci almeno descrizione e scadenza!");

            prodotti.push(p);
            localStorage.setItem('catalogo_prodotti', JSON.stringify(prodotti));
            mostraProdotti();
            
            // Reset form
            document.querySelectorAll('input').forEach(i => i.value = i.id === 'preavviso' ? 7 : '');
        }

        function mostraProdotti() {
            const container = document.getElementById('listaProdotti');
            const sortBy = document.getElementById('groupSelect').value;
            container.innerHTML = '';

            let prodottiOrdinati = [...prodotti];
            if (sortBy === 'scadenza') {
                prodottiOrdinati.sort((a, b) => new Date(a.scadenza) - new Date(b.scadenza));
            } else {
                prodottiOrdinati.sort((a, b) => a.azienda.localeCompare(b.azienda));
            }

            prodottiOrdinati.forEach(p => {
                const giorniRimanenti = Math.ceil((new Date(p.scadenza) - new Date()) / (1000 * 60 * 60 * 24));
                const alertStyle = giorniRimanenti <= p.preavviso ? 'border-l-4 border-red-500 bg-red-50' : 'border-l-4 border-green-500 bg-white';

                container.innerHTML += `
                    <div class=\
